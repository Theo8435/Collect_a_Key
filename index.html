<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collect a Key</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="touch-controls">
            <div class="d-pad">
                <div class="btn" id="btnLeft"><span>←</span>LEFT</div>
                <div class="btn" id="btnRight"><span>→</span>RIGHT</div>
            </div>
            <div class="btn" id="btnRestart"><span>↺</span>RESET</div>
            <div class="btn" id="btnJump"><span>▲</span>JUMP</div>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <span class="key">A</span> <span class="key">D</span> or <span class="key">←</span> <span class="key">→</span> 
            <span class="label">to Move</span>
        </div>
        <div class="control-group">
            <span class="key">W</span> <span class="key">Space</span> <span class="key">↑</span> 
            <span class="label">to Jump</span>
        </div>
        <div class="control-group">
            <span class="key">R</span> 
            <span class="label">to Restart</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
